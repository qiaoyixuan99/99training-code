<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮件对话历史追踪</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Sidebar: thread list ── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>邮件对话追踪</h1>
    <div id="sidebar-stats"></div>
  </div>

  <div id="sidebar-toolbar">
    <button id="btn-refresh" class="btn-primary">更新数据</button>
    <button id="btn-import-sample" class="btn-secondary">导入示例</button>
    <button id="btn-settings" class="btn-secondary" title="IMAP设置">⚙</button>
  </div>

  <div id="thread-list"></div>
</aside>

<!-- ── Main: conversation view ── -->
<main id="main-panel">
  <div id="thread-detail">
    <div class="placeholder">
      <div class="placeholder-icon">&#9993;</div>
      <p>选择左侧邮件线程查看对话历史</p>
    </div>
  </div>
</main>

<!-- ── Settings modal ── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>IMAP 邮箱设置</h2>
      <button class="modal-close" id="btn-modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-hint">使用邮箱授权码登录（非邮箱密码），授权码在邮箱设置中生成。首次配置后将保存在本地，无需重复输入。</p>

      <label>邮箱地址</label>
      <input type="email" id="cfg-email" placeholder="your@example.com" autocomplete="email">

      <label>授权码</label>
      <input type="password" id="cfg-auth-code" placeholder="输入邮箱授权码（留空则沿用已保存的）" autocomplete="off">

      <details style="margin-bottom:12px">
        <summary style="cursor:pointer;font-size:12px;color:#666">高级：手动指定服务器</summary>
        <label style="margin-top:8px">IMAP 服务器</label>
        <input type="text" id="cfg-server" placeholder="留空自动识别">
        <label>端口</label>
        <input type="number" id="cfg-port" placeholder="993" value="993">
      </details>

      <div class="modal-actions">
        <button class="btn-primary" id="btn-save-config">保存配置</button>
        <button class="btn-secondary" id="btn-test-fetch">测试连接</button>
        <button class="btn-primary" id="btn-fetch-save" style="margin-top:8px;width:100%">保存并获取邮件到本地</button>
      </div>
      <div id="cfg-status" style="margin-top:8px;font-size:12px;color:#666;max-height:200px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<script src="/static/app.js"></script>
</body>
</html>
